<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gallery">
<meta name="theme-color" content="#000000">
<title>Gallery</title>
<style>
  :root {
    --bg: #000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --surface3: #3a3a3c;
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --text2: rgba(235,235,245,0.8);
    --text3: rgba(235,235,245,0.6);
    --accent: #0a84ff;
    --danger: #ff453a;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
    --tabbar-h: 83px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%;
    background: #000;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

/* ═══════════════════════════════════════
APP SHELL — full viewport, no flexbox
═══════════════════════════════════════ */
#app { position: relative; width: 100%; height: 100dvh; background: var(–bg); }

/* ═══════════════════════════════════════
SCROLL VIEW — sits behind all overlays
═══════════════════════════════════════ */
.view {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
overscroll-behavior-y: contain;
scroll-behavior: auto;
}
.view::-webkit-scrollbar { display: none; }
.view-inner {
/* Top pad = safe-area + approx nav height, so content starts below nav on load */
padding-top: calc(var(–safe-top) + 100px);
/* Bottom pad = tab bar + safe area so last items aren’t hidden */
padding-bottom: calc(var(–safe-bottom) + var(–tabbar-h) + 12px);
}

/* ═══════════════════════════════════════
FLOATING TOP BAR
— Transparent by default
— Blurs in when .scrolled added by JS
═══════════════════════════════════════ */
.topbar {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 300;
padding: calc(var(–safe-top) + 10px) 16px 10px;
/* no background by default — invisible in screenshots when at top */
background: transparent;
border-bottom: 0.5px solid transparent;
transition: background 0.22s ease, border-color 0.22s ease;
}
.topbar.scrolled {
background: rgba(28,28,30,0.82);
backdrop-filter: saturate(180%) blur(20px);
-webkit-backdrop-filter: saturate(180%) blur(20px);
border-bottom-color: var(–border);
}
.topbar-row {
display: flex; align-items: center; gap: 4px;
/* row invisible when at top so large title takes over */
opacity: 0;
transition: opacity 0.2s ease;
pointer-events: none;
}
.topbar-row.always-show,
.topbar.scrolled .topbar-row {
opacity: 1;
pointer-events: all;
}
.topbar-title {
flex: 1; font-size: 17px; font-weight: 600;
text-align: center; letter-spacing: -0.2px;
}
.topbar-btn {
background: none; border: none; color: var(–accent);
font-size: 15px; font-weight: 500;
padding: 6px 4px; min-width: 38px; cursor: pointer;
border-radius: 8px; transition: opacity 0.15s;
}
.topbar-btn:active { opacity: 0.45; }
.topbar-btn svg { display: block; }

/* ═══════════════════════════════════════
LARGE INLINE TITLE
— shown at top of scroll content
— fades out as user scrolls
═══════════════════════════════════════ */
.large-title-block {
padding: 0 16px 4px;
transition: opacity 0.18s ease;
}
.large-title-block .lt-label {
font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
color: var(–text3); text-transform: uppercase;
margin-bottom: 2px;
}
.large-title-row {
display: flex; align-items: flex-end; justify-content: space-between;
padding-bottom: 8px;
}
.large-title-text {
font-size: 34px; font-weight: 700; letter-spacing: -0.8px;
line-height: 1.1; color: var(–text);
}
.large-title-select {
background: none; border: none; color: var(–accent);
font-size: 17px; font-weight: 400; cursor: pointer;
padding: 0 2px 6px; transition: opacity 0.15s;
}
.large-title-select:active { opacity: 0.5; }

/* ═══════════════════════════════════════
BOTTOM TAB BAR — floating pill style
Matches real iPhone Photos app exactly
═══════════════════════════════════════ */
.bottom-nav {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 300;
/* content area of tab bar */
height: var(–tabbar-h);
display: flex;
align-items: flex-start;
padding-top: 8px;
padding-bottom: var(–safe-bottom);
background: rgba(28,28,30,0.82);
backdrop-filter: saturate(180%) blur(20px);
-webkit-backdrop-filter: saturate(180%) blur(20px);
/* no border — matches Photos app screenshot behaviour */
border-top: none;
}
/* Hair line only visible when scrolled */
.bottom-nav::before {
content: ‘’;
position: absolute; top: 0; left: 0; right: 0;
height: 0.5px;
background: var(–border);
}
.nav-item {
flex: 1;
display: flex; flex-direction: column;
align-items: center; gap: 3px;
background: none; border: none;
color: var(–text3);
font-size: 10px; font-weight: 500;
letter-spacing: 0.1px;
cursor: pointer;
padding: 4px 0 0;
transition: color 0.18s;
position: relative;
}
.nav-item svg { width: 25px; height: 25px; }
.nav-item.active { color: var(–accent); }
/* Active dot / indicator — exact Photos app style */
.nav-item.active::after {
content: ‘’;
position: absolute;
top: -1px; left: 50%;
transform: translateX(-50%);
width: 4px; height: 4px;
border-radius: 50%;
background: var(–accent);
}

/* ═══════════════════════════════════════
SECTION HEADER
═══════════════════════════════════════ */
.section-head {
display: flex; align-items: baseline; justify-content: space-between;
padding: 10px 16px 4px;
font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
}
.section-head small { font-size: 13px; font-weight: 400; color: var(–accent); }

/* ═══════════════════════════════════════
PHOTO GRID — 3-col, no gap borders visible
═══════════════════════════════════════ */
.photo-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 2px;
}
.grid-item {
position: relative; aspect-ratio: 1;
overflow: hidden; cursor: pointer;
background: #1c1c1e;
}
.grid-item img {
width: 100%; height: 100%; object-fit: cover;
display: block; transition: transform 0.18s;
}
.grid-item:active img { transform: scale(0.96); }
.grid-item .vid-badge {
position: absolute; bottom: 5px; right: 5px;
background: rgba(0,0,0,0.55);
backdrop-filter: blur(4px);
border-radius: 4px;
padding: 2px 6px; font-size: 10px; font-weight: 600; color: #fff;
display: flex; align-items: center; gap: 3px;
}
.grid-item .select-ring {
position: absolute; inset: 0;
border: 3px solid transparent;
pointer-events: none; transition: border-color 0.12s;
}
.grid-item.selected .select-ring { border-color: var(–accent); }
.grid-item.selected::after {
content: ‘✓’;
position: absolute; top: 6px; right: 6px;
width: 22px; height: 22px; border-radius: 50%;
background: var(–accent); color: #fff;
font-size: 12px; font-weight: 700;
display: flex; align-items: center; justify-content: center;
}
.fav-btn {
position: absolute; bottom: 5px; left: 6px;
background: none; border: none; cursor: pointer;
font-size: 15px; line-height: 1;
text-shadow: 0 1px 4px rgba(0,0,0,0.7);
}

/* ═══════════════════════════════════════
FOLDER / ALBUM GRID
═══════════════════════════════════════ */
.folder-grid {
display: grid; grid-template-columns: repeat(2, 1fr);
gap: 14px; padding: 4px 14px;
}
.folder-card { cursor: pointer; border-radius: 14px; overflow: hidden; background: var(–surface); }
.folder-thumb {
width: 100%; aspect-ratio: 1;
display: grid; grid-template-columns: 1fr 1fr; gap: 1.5px;
background: var(–surface3);
}
.folder-thumb img { width: 100%; height: 100%; object-fit: cover; }
.folder-thumb .placeholder { background: var(–surface3); }
.folder-info { padding: 8px 10px 10px; }
.folder-name { font-size: 14px; font-weight: 600; }
.folder-count { font-size: 12px; color: var(–text3); margin-top: 1px; }
.new-folder-card {
border: 2px dashed rgba(255,255,255,0.12);
border-radius: 14px;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
aspect-ratio: 1.05; gap: 8px; cursor: pointer;
color: var(–accent); font-size: 13px; font-weight: 500;
background: rgba(10,132,255,0.04);
transition: background 0.18s;
}
.new-folder-card:active { background: rgba(10,132,255,0.11); }

/* ═══════════════════════════════════════
VIDEO LINKS GRID
═══════════════════════════════════════ */
.video-link-grid {
display: grid; grid-template-columns: repeat(2, 1fr);
gap: 10px; padding: 4px 12px;
}
.video-link-card {
border-radius: var(–radius); overflow: hidden;
background: var(–surface); cursor: pointer;
transition: transform 0.15s;
}
.video-link-card:active { transform: scale(0.97); }
.video-link-thumb {
position: relative; aspect-ratio: 16/9;
background: var(–surface2); overflow: hidden;
}
.video-link-thumb img { width: 100%; height: 100%; object-fit: cover; }
.no-thumb {
width: 100%; height: 100%;
display: flex; align-items: center; justify-content: center;
background: linear-gradient(135deg, #1a1a2e, #16213e); font-size: 32px;
}
.play-overlay {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
background: rgba(0,0,0,0.22);
}
.play-circle {
width: 44px; height: 44px; border-radius: 50%;
background: rgba(255,255,255,0.88);
display: flex; align-items: center; justify-content: center;
}
.play-circle svg { margin-left: 3px; }
.video-link-info { padding: 8px 10px 10px; }
.video-link-title { font-size: 13px; font-weight: 600; line-height: 1.3; }
.video-link-url { font-size: 11px; color: var(–text3); margin-top: 2px; }
.video-link-actions { display: flex; gap: 6px; margin-top: 6px; }
.vl-btn {
background: var(–surface3); border: none; color: var(–text2);
font-size: 11px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
}
.vl-btn.danger { background: rgba(255,69,58,0.15); color: var(–danger); }
.vl-btn:active { opacity: 0.6; }

/* ═══════════════════════════════════════
ADD LINK BAR
═══════════════════════════════════════ */
.add-link-bar {
padding: 12px 14px; background: var(–surface);
border-radius: var(–radius); margin: 8px 12px;
}
.add-link-bar h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
.add-link-bar input {
width: 100%; background: var(–surface2); border: none; border-radius: 8px;
color: var(–text); font-size: 14px; padding: 10px 12px;
margin-bottom: 8px; font-family: inherit;
}
.add-link-bar .row { display: flex; gap: 8px; }
.btn {
flex: 1; border: none; border-radius: 10px; padding: 11px;
font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: var(–accent); color: #fff; }
.btn-secondary { background: var(–surface2); color: var(–text2); }

/* ═══════════════════════════════════════
LIGHTBOX
═══════════════════════════════════════ */
.lightbox {
position: fixed; inset: 0; background: #000;
z-index: 500; display: none; flex-direction: column;
}
.lightbox.open { display: flex; }
.lb-topbar {
position: absolute; top: 0; left: 0; right: 0;
padding: calc(var(–safe-top) + 4px) 16px 12px;
background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
display: flex; align-items: center; gap: 12px; z-index: 10;
}
.lb-topbar-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 4px; }
.lb-topbar-title { flex: 1; text-align: center; font-size: 15px; font-weight: 600; color: var(–text2); }
.lb-media { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.lb-media img { max-width: 100%; max-height: 100%; object-fit: contain; }
.lb-media video { max-width: 100%; max-height: 100%; }
.lb-bottom {
position: absolute; bottom: 0; left: 0; right: 0;
padding: 12px 16px calc(var(–safe-bottom) + 12px);
background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
display: flex; justify-content: space-around;
}
.lb-action {
background: none; border: none; color: #fff; cursor: pointer;
font-size: 11px; font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.lb-action svg { width: 24px; height: 24px; }
.lb-prev, .lb-next {
position: absolute; top: 50%; transform: translateY(-50%);
background: rgba(255,255,255,0.13); border: none; border-radius: 50%;
width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
color: #fff; font-size: 22px; cursor: pointer; z-index: 10;
}
.lb-prev { left: 10px; }
.lb-next { right: 10px; }

/* ═══════════════════════════════════════
MODAL SHEET
═══════════════════════════════════════ */
.modal-overlay {
position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 600;
display: none; align-items: flex-end;
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }
.modal-sheet {
width: 100%; background: #2c2c2e;
border-radius: 20px 20px 0 0;
padding: 16px 20px calc(var(–safe-bottom) + 16px);
animation: sheetUp 0.28s cubic-bezier(0.32,0.72,0,1);
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
.modal-input {
width: 100%; background: var(–surface3); border: none; border-radius: 10px;
color: var(–text); font-size: 15px; padding: 12px 14px; margin-bottom: 12px; font-family: inherit;
}
.modal-row { display: flex; gap: 10px; }
.action-list { list-style: none; }
.action-list li {
padding: 14px 4px; border-bottom: 0.5px solid rgba(255,255,255,0.08);
font-size: 16px; cursor: pointer; color: var(–accent);
display: flex; align-items: center; gap: 12px;
transition: opacity 0.15s;
}
.action-list li:last-child { border-bottom: none; }
.action-list li.danger { color: var(–danger); }
.action-list li:active { opacity: 0.5; }

/* ═══════════════════════════════════════
UPLOAD TOAST
═══════════════════════════════════════ */
.upload-toast {
position: fixed;
bottom: calc(var(–safe-bottom) + var(–tabbar-h) + 10px);
left: 16px; right: 16px;
background: rgba(44,44,46,0.96);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-radius: 14px;
padding: 12px 16px;
z-index: 400; display: none;
box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.upload-toast.visible { display: block; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.upload-toast-label { font-size: 13px; color: var(–text2); margin-bottom: 6px; }
.progress-bar { height: 3px; background: var(–surface3); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(–accent); border-radius: 2px; transition: width 0.3s; }

/* ═══════════════════════════════════════
FAB
═══════════════════════════════════════ */
.fab {
position: fixed;
bottom: calc(var(–safe-bottom) + var(–tabbar-h) + 12px);
right: 18px; z-index: 350;
width: 50px; height: 50px; border-radius: 50%;
background: var(–accent); border: none; color: #fff;
display: flex; align-items: center; justify-content: center;
box-shadow: 0 4px 20px rgba(10,132,255,0.45);
cursor: pointer; transition: transform 0.14s;
}
.fab:active { transform: scale(0.9); }

/* ═══════════════════════════════════════
BULK TOOLBAR
═══════════════════════════════════════ */
.bulk-toolbar {
position: fixed; bottom: 0; left: 0; right: 0;
background: rgba(28,28,30,0.95);
backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
padding: 10px 20px calc(var(–safe-bottom) + 10px);
display: none; align-items: center; justify-content: space-between;
border-top: 0.5px solid var(–border); z-index: 310;
}
.bulk-toolbar.visible { display: flex; }
.bulk-toolbar-btn {
background: none; border: none; color: var(–accent);
font-size: 15px; font-weight: 500; cursor: pointer; padding: 6px 10px;
}
.bulk-toolbar-btn.danger { color: var(–danger); }
.bulk-toolbar-btn:active { opacity: 0.5; }

/* ═══════════════════════════════════════
EMBED & MISC
═══════════════════════════════════════ */
.embed-no-thumb {
width: 100%; height: 100%;
display: flex; align-items: center; justify-content: center;
font-size: 30px;
background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}
.embed-badge { background: rgba(10,132,255,0.75) !important; }
.empty-state {
display: flex; flex-direction: column; align-items: center; justify-content: center;
padding: 60px 30px; text-align: center; gap: 12px;
}
.empty-state svg { opacity: 0.25; }
.empty-state h3 { font-size: 18px; font-weight: 600; color: var(–text2); }
.empty-state p { font-size: 14px; color: var(–text3); }
@keyframes shimmer { 0%,100%{opacity:.3} 50%{opacity:.6} }
.shimmer { animation: shimmer 1.5s infinite; background: var(–surface2); }
input::-webkit-scrollbar, textarea::-webkit-scrollbar { display: none; }
</style>

</head>
<body>
<div id="app">

  <!-- ── FLOATING TOP BAR ── -->

  <div class="topbar" id="topbar">
    <div class="topbar-row" id="topbarRow">
      <button class="topbar-btn" id="btnBack" style="visibility:hidden" onclick="goBack()">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="topbar-title" id="topTitle">Photos</div>
      <button class="topbar-btn" id="btnSelect" onclick="toggleSelect()">Select</button>
    </div>
  </div>

  <!-- ── SCROLL VIEW ── -->

  <div class="view" id="mainView">
    <div class="view-inner" id="viewContent"></div>
  </div>

  <!-- ── LIGHTBOX ── -->

  <div class="lightbox" id="lightbox">
    <div class="lb-topbar">
      <button class="lb-topbar-btn" onclick="closeLightbox()">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="lb-topbar-title" id="lbTitle"></div>
      <button class="lb-topbar-btn" onclick="lbShare()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>
    <button class="lb-prev" id="lbPrev" onclick="lbNav(-1)">‹</button>
    <div class="lb-media" id="lbMedia"></div>
    <button class="lb-next" id="lbNext" onclick="lbNav(1)">›</button>
    <div class="lb-bottom">
      <button class="lb-action" onclick="lbFav()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Favourite
      </button>
      <button class="lb-action" onclick="lbMove()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Move
      </button>
      <button class="lb-action" onclick="lbDelete()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Delete
      </button>
    </div>
  </div>

  <!-- ── BULK TOOLBAR ── -->

  <div class="bulk-toolbar" id="bulkToolbar">
    <button class="bulk-toolbar-btn" onclick="bulkCancel()">Cancel</button>
    <span id="bulkCount" style="font-size:14px;color:var(--text2)">0 Selected</span>
    <button class="bulk-toolbar-btn danger" onclick="bulkDelete()">Delete</button>
  </div>

  <!-- ── UPLOAD TOAST ── -->

  <div class="upload-toast" id="uploadToast">
    <div class="upload-toast-label" id="uploadLabel">Uploading…</div>
    <div class="progress-bar"><div class="progress-fill" id="uploadFill" style="width:0%"></div></div>
  </div>

  <!-- ── FAB ── -->

  <button class="fab" id="fabBtn" onclick="fabAction()">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- ── FLOATING BOTTOM TAB BAR ── -->

<script>
// ── LARGE TITLE HELPER ──
function largeTitleHTML(title, showSelect) {
  const selBtn = showSelect
    ? `<button class="large-title-select" onclick="toggleSelect()">${selectMode?'Done':'Select'}</button>`
    : '';
  return `<div class="large-title-block" id="largeTitleBlock">
    <div class="large-title-row">
      <div class="large-title-text" id="largeTitleText">${title}</div>
      ${selBtn}
    </div>
  </div>`;
}


// ══════════════════════════════════════════════
//  CONFIG — set your ImgBB key here
// ══════════════════════════════════════════════
const IMGBB_KEY = 'YOUR_IMGBB_API_KEY'; // ← Paste your ImgBB API key

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const DB_KEY = 'gallery_db_v1';
let db = loadDB();

function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    media: [],      // [{id, name, type, src, thumb, folder, fav, date, hosted}]
    folders: [],    // [{id, name}]
    links: []       // [{id, title, url, thumb, date}]
  };
}
function saveDB() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch(e) {
    console.warn('LocalStorage full, trimming blobs');
  }
}

let currentTab = 'photos';
let currentFolder = null; // null = all, string = folder id
let selectMode = false;
let selectedIds = new Set();
let lbItems = [];
let lbIndex = 0;
let lbTouchStartX = 0;
let uploadQueue = [];
let uploading = false;

// ══════════════════════════════════════════════
//  ROUTING / RENDER
// ══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  currentFolder = null;
  selectMode = false;
  selectedIds.clear();
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  document.getElementById('btnBack').style.visibility = 'hidden';
  document.getElementById('btnSelect').style.display = tab === 'links' ? 'none' : '';
  render();
}

function render() {
  const el = document.getElementById('viewContent');
  if (currentTab === 'photos') renderPhotos(el);
  else if (currentTab === 'albums') renderAlbums(el);
  else if (currentTab === 'videos') renderVideos(el);
  else if (currentTab === 'links') renderLinks(el);
  updateBulkToolbar();
  updateTitle();
}

function updateTitle() {
  const titles = {photos:'Photos', albums: currentFolder ? getFolderName(currentFolder) : 'Albums', videos:'Videos', links:'Video Links'};
  const t = titles[currentTab] || 'Gallery';
  document.getElementById('topTitle').textContent = t;
  const lt = document.getElementById('largeTitleText');
  if (lt) lt.textContent = t;
  // Show topbar row when in sub-folder or links (no large title select btn context)
  const row = document.getElementById('topbarRow');
  if (row) {
    const needAlways = (currentTab === 'albums' && currentFolder) || currentTab === 'links';
    if (needAlways) row.classList.add('always-show');
    else row.classList.remove('always-show');
  }
  // Update select button in large title if present
  const selBtn = document.querySelector('.large-title-select');
  if (selBtn) selBtn.textContent = selectMode ? 'Done' : 'Select';
}
function getFolderName(id) {
  const f = db.folders.find(f=>f.id===id);
  return f ? f.name : 'Album';
}

// ── PHOTOS ──
function renderPhotos(el) {
  const items = db.media.filter(m => m.type === 'image' || m.type === 'video' || m.type === 'embed');
  if (!items.length) {
    el.innerHTML = largeTitleHTML('Photos', true) + emptyState('No Photos Yet','Tap + to add photos or videos');
    return;
  }

  // group by month
  const groups = {};
  items.slice().reverse().forEach(m => {
    const d = new Date(m.date);
    const key = d.toLocaleString('default',{month:'long',year:'numeric'});
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });

  let html = largeTitleHTML('Photos', true);
  let firstGroup = true;
  for (const [month, ms] of Object.entries(groups)) {
    html += `<div class="section-head${firstGroup ? ' first' : ''}">${month} <small>${ms.length}</small></div>`;
    firstGroup = false;
    html += `<div class="photo-grid" id="grid_${month.replace(/\s/g,'')}">`;
    ms.forEach(m => { html += gridItemHTML(m); });
    html += `</div>`;
  }
  el.innerHTML = html;
}

// ── ALBUMS ──
function renderAlbums(el) {
  if (currentFolder) {
    renderFolderContents(el, currentFolder);
    return;
  }
  let html = largeTitleHTML('Albums', false);
  html += `<div class="folder-grid">`;

  // My Photos virtual album
  const allCount = db.media.length;
  const allThumbs = db.media.slice(-4).map(m=>m.thumb||m.src);
  html += folderCardHTML('__all__','All Photos', allCount, allThumbs);

  // Favourites
  const favs = db.media.filter(m=>m.fav);
  html += folderCardHTML('__fav__','Favourites', favs.length, favs.slice(-4).map(m=>m.thumb||m.src), '❤️');

  // User folders
  db.folders.forEach(f => {
    const items = db.media.filter(m=>m.folder===f.id);
    html += folderCardHTML(f.id, f.name, items.length, items.slice(-4).map(m=>m.thumb||m.src));
  });

  // New folder button
  html += `<div class="new-folder-card" onclick="showNewFolderModal()">
    <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    New Album
  </div>`;
  html += `</div>`;
  el.innerHTML = html;
}

function folderCardHTML(id, name, count, thumbs, icon='') {
  const thumbCells = Array(4).fill(0).map((_,i) =>
    thumbs[i] ? `<img src="${thumbs[i]}" loading="lazy" onerror="this.className='placeholder shimmer'">` : `<div class="placeholder shimmer"></div>`
  ).join('');
  return `<div class="folder-card" onclick="openFolder('${id}')">
    <div class="folder-thumb">${thumbCells}</div>
    <div class="folder-info">
      <div class="folder-name">${icon} ${escHtml(name)}</div>
      <div class="folder-count">${count} item${count!==1?'s':''}</div>
    </div>
  </div>`;
}

function renderFolderContents(el, folderId) {
  let items;
  const folderName = folderId==='__all__'?'All Photos':folderId==='__fav__'?'Favourites':getFolderName(folderId);
  if (folderId === '__all__') items = db.media;
  else if (folderId === '__fav__') items = db.media.filter(m=>m.fav);
  else items = db.media.filter(m=>m.folder===folderId);

  if (!items.length) { el.innerHTML = largeTitleHTML(folderName,true) + emptyState('Empty Album','Add photos to this album'); return; }
  let html = largeTitleHTML(folderName,true) + `<div class="photo-grid">`;
  items.slice().reverse().forEach(m => { html += gridItemHTML(m); });
  html += `</div>`;
  el.innerHTML = html;
}

function openFolder(id) {
  currentFolder = id;
  document.getElementById('btnBack').style.visibility = 'visible';
  updateTitle();
  renderAlbums(document.getElementById('viewContent'));
}

function goBack() {
  currentFolder = null;
  document.getElementById('btnBack').style.visibility = 'hidden';
  render();
}

// ── VIDEOS ──
function renderVideos(el) {
  const items = db.media.filter(m => m.type === 'video' || m.type === 'embed');
  if (!items.length) { el.innerHTML = largeTitleHTML('Videos',true) + emptyState('No Videos Yet','Add videos or paste embed links'); return; }
  let html = largeTitleHTML('Videos',true) + '<div class="photo-grid">';
  items.slice().reverse().forEach(m => { html += gridItemHTML(m); });
  html += '</div>';
  el.innerHTML = html;
}

// ── LINKS ──
function renderLinks(el) {
  let html = largeTitleHTML('Video Links', false) + `<div class="add-link-bar">
    <h3>Add Video Link</h3>
    <input class="modal-input" type="text" id="linkTitle" placeholder="Title (optional)">
    <input class="modal-input" type="url" id="linkUrl" placeholder="Paste embed or page URL…" style="margin-bottom:8px">
    <input class="modal-input" type="url" id="linkThumb" placeholder="Thumbnail URL (optional)" style="margin-bottom:8px">
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.5">
      💡 Paste an XVideos embed URL like<br>
      <code style="color:var(--accent);font-size:11px">https://www.xvideos.com/embedframe/12345678</code><br>
      — thumbnail &amp; embed are auto-detected.
    </div>
    <div class="row">
      <button class="btn btn-primary" onclick="addLink()">Add</button>
    </div>
  </div>`;

  if (!db.links.length) {
    html += emptyState('No Links Yet','Paste a video link above to add it');
  } else {
    html += '<div class="section-head">Saved Links <small>' + db.links.length + '</small></div>';
    html += '<div class="video-link-grid">';
    db.links.slice().reverse().forEach(l => { html += linkCardHTML(l); });
    html += '</div>';
  }
  el.innerHTML = html;
}

// ── Parse any supported embed/page URL → {embedUrl, thumbUrl, siteUrl, videoId, platform}
function parseVideoUrl(raw) {
  raw = raw.trim();
  const result = { embedUrl: null, thumbUrl: null, siteUrl: raw, videoId: null, platform: 'generic' };

  // ── XVideos embed: xvideos.com/embedframe/XXXXXXXX  or  /embedframe/XXXXXXXX
  let m = raw.match(/xvideos\.com\/embedframe\/(\d+)/i);
  if (m) {
    result.platform = 'xvideos';
    result.videoId = m[1];
    result.embedUrl = `https://www.xvideos.com/embedframe/${m[1]}`;
    result.thumbUrl = `https://cdn77-pic.xvideos-cdn.com/videos/thumbs169poster/${m[1].slice(0,1)}/${m[1].slice(1,2)}/${m[1].slice(2,3)}/${m[1]}/1.jpg`;
    result.siteUrl  = `https://www.xvideos.com/video${m[1]}/_`;
    return result;
  }

  // ── XVideos page URL: xvideos.com/videoXXXXXXXX/...
  m = raw.match(/xvideos\.com\/video(\d+)/i);
  if (m) {
    result.platform = 'xvideos';
    result.videoId = m[1];
    result.embedUrl = `https://www.xvideos.com/embedframe/${m[1]}`;
    result.thumbUrl = `https://cdn77-pic.xvideos-cdn.com/videos/thumbs169poster/${m[1].slice(0,1)}/${m[1].slice(1,2)}/${m[1].slice(2,3)}/${m[1]}/1.jpg`;
    result.siteUrl  = raw;
    return result;
  }

  // ── XHamster embed: xhamster.com/xembed.php?video=XXXXXXX
  m = raw.match(/xhamster\.[a-z]+\/xembed\.php\?video=(\d+)/i);
  if (!m) m = raw.match(/xhamster\.[a-z]+\/videos\/.*?-(\d+)/i);
  if (m) {
    result.platform = 'xhamster';
    result.videoId = m[1];
    result.embedUrl = `https://xhamster.com/xembed.php?video=${m[1]}`;
    result.thumbUrl = null;
    result.siteUrl  = `https://xhamster.com/videos/x-${m[1]}`;
    return result;
  }

  // ── Pornhub embed: pornhub.com/embed/XXXXXXXXX
  m = raw.match(/pornhub\.com\/embed\/([a-z0-9]+)/i);
  if (!m) m = raw.match(/pornhub\.com\/view_video\.php\?viewkey=([a-z0-9]+)/i);
  if (m) {
    result.platform = 'pornhub';
    result.videoId = m[1];
    result.embedUrl = `https://www.pornhub.com/embed/${m[1]}`;
    result.thumbUrl = null;
    result.siteUrl  = `https://www.pornhub.com/view_video.php?viewkey=${m[1]}`;
    return result;
  }

  // ── RedTube embed
  m = raw.match(/redtube\.com\/(\d+)/i);
  if (m) {
    result.platform = 'redtube';
    result.videoId = m[1];
    result.embedUrl = `https://embed.redtube.com/?id=${m[1]}&bgcolor=000000`;
    result.siteUrl  = `https://www.redtube.com/${m[1]}`;
    return result;
  }

  // ── YouPorn embed
  m = raw.match(/youporn\.com\/watch\/(\d+)/i);
  if (m) {
    result.platform = 'youporn';
    result.videoId = m[1];
    result.embedUrl = `https://www.youporn.com/embed/${m[1]}`;
    result.siteUrl  = raw;
    return result;
  }

  // ── Generic: treat the URL as an embed src directly if it looks like an embed
  if (raw.includes('embed') || raw.includes('player') || raw.includes('iframe')) {
    result.embedUrl = raw;
  }
  return result;
}

function platformIcon(platform) {
  const icons = { xvideos:'🎬', xhamster:'🐹', pornhub:'🟠', redtube:'🔴', youporn:'💛', generic:'▶️' };
  return icons[platform] || '▶️';
}

function linkCardHTML(l) {
  const domain = (() => { try { return new URL(l.siteUrl||l.url).hostname.replace('www.',''); } catch(e){ return (l.siteUrl||l.url||'').slice(0,30); }})();
  const hasThumb = !!(l.thumbUrl||l.thumb);
  const thumbHTML = hasThumb
    ? `<img src="${escHtml(l.thumbUrl||l.thumb)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=no-thumb>${platformIcon(l.platform)}</div>'">`
    : `<div class="no-thumb">${platformIcon(l.platform)}</div>`;
  const hasEmbed = !!l.embedUrl;
  return `<div class="video-link-card" id="vlc_${l.id}">
    <div class="video-link-thumb" onclick="playLinkCard('${l.id}')">
      ${thumbHTML}
      <div class="play-overlay" id="vlo_${l.id}"><div class="play-circle">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="#333"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div></div>
    </div>
    <div class="video-link-info">
      <div class="video-link-title" onclick="openLinkSite('${escHtml(l.siteUrl||l.url)}')" style="cursor:pointer">${escHtml(l.title||domain)} <span style="font-size:10px;color:var(--accent)">↗</span></div>
      <div class="video-link-url">${escHtml(domain)}</div>
      <div class="video-link-actions">
        ${hasEmbed ? `<button class="vl-btn" onclick="playLinkCard('${l.id}')">▶ Play</button>` : ''}
        <button class="vl-btn" onclick="openLinkSite('${escHtml(l.siteUrl||l.url)}')">Site ↗</button>
        <button class="vl-btn danger" onclick="deleteLink('${l.id}')">✕</button>
      </div>
    </div>
  </div>`;
}

// Opens the embed inline inside the card thumbnail area
function playLinkCard(id) {
  const l = db.links.find(l=>l.id===id);
  if (!l || !l.embedUrl) { openLinkSite(l ? (l.siteUrl||l.url) : ''); return; }
  const thumb = document.querySelector(`#vlc_${id} .video-link-thumb`);
  if (!thumb) return;
  // If already playing, open site instead
  if (thumb.querySelector('iframe')) { openLinkSite(l.siteUrl||l.url); return; }
  thumb.innerHTML = `<iframe
    src="${escHtml(l.embedUrl)}"
    frameborder="0"
    allowfullscreen
    allow="autoplay; fullscreen"
    scrolling="no"
    style="width:100%;height:100%;position:absolute;inset:0;border:none;background:#000"
  ></iframe>`;
  thumb.style.position = 'relative';
  thumb.style.aspectRatio = '16/9';
}

function addLink() {
  const raw = document.getElementById('linkUrl').value.trim();
  if (!raw) { alert('Please enter a URL'); return; }
  const customTitle = document.getElementById('linkTitle').value.trim();
  const customThumb = document.getElementById('linkThumb').value.trim();
  const parsed = parseVideoUrl(raw);
  const mediaId = uid();
  const thumbFinal = customThumb || parsed.thumbUrl || null;
  const titleFinal = customTitle || (parsed.platform !== 'generic'
    ? parsed.platform.charAt(0).toUpperCase()+parsed.platform.slice(1)+' Video'
    : 'Video Link');

  // Save to links list
  const linkEntry = {
    id: uid(),
    mediaId,
    title: titleFinal,
    url: raw,
    siteUrl: parsed.siteUrl || raw,
    embedUrl: parsed.embedUrl,
    thumbUrl: thumbFinal,
    thumb: thumbFinal,
    platform: parsed.platform,
    videoId: parsed.videoId,
    date: Date.now()
  };
  db.links.push(linkEntry);

  // Also save as a media entry so it appears in the gallery grid
  const mediaEntry = {
    id: mediaId,
    name: titleFinal,
    type: 'embed',
    src: parsed.siteUrl || raw,
    thumb: thumbFinal,
    embedUrl: parsed.embedUrl,
    siteUrl: parsed.siteUrl || raw,
    platform: parsed.platform,
    videoId: parsed.videoId,
    folder: null,
    fav: false,
    date: Date.now(),
    hosted: null
  };
  db.media.push(mediaEntry);

  saveDB();
  render();
  showToast('✅ Video added to gallery');
}

function deleteLink(id) {
  if (!confirm('Remove this link?')) return;
  const link = db.links.find(l=>l.id===id);
  if (link && link.mediaId) db.media = db.media.filter(m=>m.id!==link.mediaId);
  db.links = db.links.filter(l=>l.id!==id);
  saveDB();
  render();
}

function openLinkSite(url) {
  if (!url) return;
  window.open(url, '_blank');
}

// legacy fallback used elsewhere
function openLink(url) { openLinkSite(url); }

// ══════════════════════════════════════════════
//  GRID ITEM
// ══════════════════════════════════════════════
function gridItemHTML(m) {
  const sel = selectedIds.has(m.id) ? 'selected' : '';
  const src = m.thumb || m.src || '';
  const isVid = m.type === 'video';
  const isEmbed = m.type === 'embed';
  const favHeart = m.fav ? '❤️' : '🤍';

  let mediaEl, badge;
  if (isEmbed) {
    const icon = platformIcon(m.platform || 'generic');
    const hasThumb = !!src;
    mediaEl = hasThumb
      ? `<img src="${escHtml(src)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="embed-no-thumb" style="display:none">${icon}</div>`
      : `<div class="embed-no-thumb">${icon}</div>`;
    badge = `<div class="vid-badge embed-badge">
      <svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
      ${(m.platform||'video').toUpperCase()}
    </div>`;
  } else if (isVid) {
    mediaEl = `<img src="${escHtml(src)}" loading="lazy" onerror="this.src=''">`;
    badge = `<div class="vid-badge"><svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg> Video</div>`;
  } else {
    mediaEl = `<img src="${escHtml(src)}" loading="lazy" onerror="this.style.display='none'">`;
    badge = '';
  }

  return `<div class="grid-item ${sel}" data-id="${m.id}" onclick="gridItemClick('${m.id}')">
    ${mediaEl}
    <div class="select-ring"></div>
    ${badge}
    <button class="fav-btn" onclick="toggleFav(event,'${m.id}')">${favHeart}</button>
  </div>`;
}

function gridItemClick(id) {
  if (selectMode) {
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    updateBulkToolbar();
    render();
    return;
  }
  const m = db.media.find(x=>x.id===id);
  if (!m) return;

  // Embed items → action sheet
  if (m.type === 'embed') {
    showEmbedActionSheet(m);
    return;
  }

  // Normal media → lightbox
  const items = currentItems();
  lbItems = items;
  lbIndex = items.findIndex(x=>x.id===id);
  openLightbox();
}

function showEmbedActionSheet(m) {
  const title = escHtml(m.name || m.platform || 'Video');
  showModal(`
    <div style="text-align:center;margin-bottom:16px">
      ${m.thumb ? `<img src="${escHtml(m.thumb)}" style="width:100%;border-radius:10px;aspect-ratio:16/9;object-fit:cover;margin-bottom:10px">` : `<div style="font-size:48px;margin-bottom:10px">${platformIcon(m.platform)}</div>`}
      <div style="font-size:15px;font-weight:600;line-height:1.3">${title}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:3px">${escHtml((m.siteUrl||'').replace('https://','').split('/')[0])}</div>
    </div>
    <ul class="action-list">
      <li onclick="playEmbedInLightbox('${m.id}')">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="var(--accent)"><polygon points="5 3 19 12 5 21"/></svg>
        Play in App
      </li>
      <li onclick="closeModal();openLinkSite('${escHtml(m.siteUrl||'')}')">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Go to Site
      </li>
      <li onclick="closeModal();toggleFavById('${m.id}')">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="${m.fav?'#ff2d55':'none'}" stroke="${m.fav?'#ff2d55':'currentColor'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ${m.fav ? 'Remove from Favourites' : 'Add to Favourites'}
      </li>
      <li class="danger" onclick="closeModal();deleteEmbedItem('${m.id}')">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
        Delete
      </li>
    </ul>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="closeModal()">Cancel</button>
  `);
}

function toggleFavById(id) {
  const m = db.media.find(m=>m.id===id);
  if (m) { m.fav = !m.fav; saveDB(); render(); }
}

function deleteEmbedItem(id) {
  if (!confirm('Delete this video?')) return;
  db.media = db.media.filter(m=>m.id!==id);
  // Also remove from links if linked
  db.links = db.links.filter(l=>l.mediaId!==id);
  saveDB();
  render();
}

function playEmbedInLightbox(id) {
  closeModal();
  const items = currentItems().length ? currentItems() : db.media;
  lbItems = items;
  lbIndex = items.findIndex(x=>x.id===id);
  if (lbIndex === -1) { lbItems = db.media; lbIndex = db.media.findIndex(x=>x.id===id); }
  openLightbox();
}

function currentItems() {
  if (currentTab === 'photos') return db.media.filter(m => m.type === 'image' || m.type === 'video' || m.type === 'embed');
  if (currentTab === 'videos') return db.media.filter(m=>m.type==='video'||m.type==='embed');
  if (currentTab === 'albums') {
    if (!currentFolder) return db.media;
    if (currentFolder === '__all__') return db.media;
    if (currentFolder === '__fav__') return db.media.filter(m=>m.fav);
    return db.media.filter(m=>m.folder===currentFolder);
  }
  return db.media;
}

function toggleFav(e, id) {
  e.stopPropagation();
  const m = db.media.find(m=>m.id===id);
  if (m) { m.fav = !m.fav; saveDB(); render(); }
}

// ══════════════════════════════════════════════
//  LIGHTBOX
// ══════════════════════════════════════════════
function openLightbox() {
  document.getElementById('lightbox').classList.add('open');
  renderLbItem();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbMedia').innerHTML = '';
}
function renderLbItem() {
  const m = lbItems[lbIndex];
  if (!m) return;
  document.getElementById('lbTitle').textContent = (lbIndex+1) + ' / ' + lbItems.length;
  document.getElementById('lbPrev').style.display = lbIndex > 0 ? '' : 'none';
  document.getElementById('lbNext').style.display = lbIndex < lbItems.length-1 ? '' : 'none';
  const el = document.getElementById('lbMedia');

  if (m.type === 'embed') {
    // Show embed iframe fullscreen
    el.innerHTML = `
      <div style="width:100%;max-width:600px;display:flex;flex-direction:column;gap:0">
        <iframe
          src="${escHtml(m.embedUrl||m.siteUrl||'')}"
          frameborder="0"
          allowfullscreen
          allow="autoplay; fullscreen; encrypted-media"
          scrolling="no"
          style="width:100%;aspect-ratio:16/9;border:none;background:#000;display:block"
        ></iframe>
        <div style="padding:10px 12px;background:rgba(28,28,30,0.9);border-radius:0 0 10px 10px">
          <div style="font-size:14px;font-weight:600;margin-bottom:4px">${escHtml(m.name||m.platform||'Video')}</div>
          <button onclick="openLinkSite('${escHtml(m.siteUrl||'')}')" style="background:var(--accent);border:none;color:#fff;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">
            Open on Site ↗
          </button>
        </div>
      </div>`;
  } else if (m.type === 'video') {
    el.innerHTML = `<video src="${escHtml(m.src)}" controls playsinline autoplay style="max-width:100%;max-height:100%"></video>`;
  } else {
    el.innerHTML = `<img src="${escHtml(m.src)}" style="max-width:100%;max-height:100%;object-fit:contain">`;
  }
}
function lbNav(dir) {
  lbIndex = Math.max(0, Math.min(lbItems.length-1, lbIndex+dir));
  renderLbItem();
}
function lbShare() {
  const m = lbItems[lbIndex];
  if (!m) return;
  if (navigator.share) navigator.share({url: m.src || m.hosted || ''}).catch(()=>{});
  else { navigator.clipboard.writeText(m.hosted || m.src || ''); showToast('Link copied!'); }
}
function lbFav() {
  const m = lbItems[lbIndex];
  if (!m) return;
  m.fav = !m.fav;
  saveDB();
  showToast(m.fav ? '❤️ Added to Favourites' : 'Removed from Favourites');
}
function lbMove() {
  const m = lbItems[lbIndex];
  if (!m) return;
  showMoveModal([m.id]);
}
function lbDelete() {
  const m = lbItems[lbIndex];
  if (!m) return;
  if (!confirm('Delete this item?')) return;
  db.media = db.media.filter(x=>x.id!==m.id);
  saveDB();
  lbItems.splice(lbIndex,1);
  if (!lbItems.length) { closeLightbox(); render(); return; }
  lbIndex = Math.min(lbIndex, lbItems.length-1);
  renderLbItem();
  render();
}

// Touch swipe on lightbox
document.getElementById('lightbox').addEventListener('touchstart', e => { lbTouchStartX = e.touches[0].clientX; }, {passive:true});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - lbTouchStartX;
  if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
}, {passive:true});

// ══════════════════════════════════════════════
//  SELECT MODE
// ══════════════════════════════════════════════
function toggleSelect() {
  selectMode = !selectMode;
  selectedIds.clear();
  document.getElementById('btnSelect').textContent = selectMode ? 'Done' : 'Select';
  const selBtn = document.querySelector('.large-title-select');
  if (selBtn) selBtn.textContent = selectMode ? 'Done' : 'Select';
  updateBulkToolbar();
  render();
}
function updateBulkToolbar() {
  const t = document.getElementById('bulkToolbar');
  if (selectMode && selectedIds.size > 0) {
    t.classList.add('visible');
    document.getElementById('bulkCount').textContent = selectedIds.size + ' Selected';
  } else {
    t.classList.remove('visible');
  }
}
function bulkCancel() {
  selectMode = false;
  selectedIds.clear();
  document.getElementById('btnSelect').textContent = 'Select';
  updateBulkToolbar();
  render();
}
function bulkDelete() {
  if (!confirm(`Delete ${selectedIds.size} item(s)?`)) return;
  db.media = db.media.filter(m => !selectedIds.has(m.id));
  saveDB();
  bulkCancel();
}

// ══════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════
function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function showNewFolderModal() {
  showModal(`
    <div class="modal-title">New Album</div>
    <input class="modal-input" id="newFolderName" type="text" placeholder="Album Name" autofocus>
    <div class="modal-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createFolder()">Create</button>
    </div>
  `);
}
function createFolder() {
  const name = document.getElementById('newFolderName').value.trim();
  if (!name) return;
  db.folders.push({ id: uid(), name });
  saveDB();
  closeModal();
  render();
}

function showMoveModal(ids) {
  const opts = [
    { id: '__none__', name: 'None (remove from album)' },
    ...db.folders.map(f => ({ id: f.id, name: f.name }))
  ].map(f => `<li onclick="moveItems(${JSON.stringify(ids)},'${f.id}')">${escHtml(f.name)}</li>`).join('');
  showModal(`<div class="modal-title">Move to Album</div><ul class="action-list">${opts}</ul>`);
}
function moveItems(ids, folderId) {
  ids.forEach(id => {
    const m = db.media.find(m=>m.id===id);
    if (m) m.folder = folderId === '__none__' ? null : folderId;
  });
  saveDB();
  closeModal();
  render();
}

// ══════════════════════════════════════════════
//  FAB
// ══════════════════════════════════════════════
function fabAction() {
  if (currentTab === 'links') { document.getElementById('linkUrl').focus(); return; }
  if (currentTab === 'albums' && !currentFolder) { showNewFolderModal(); return; }
  showModal(`
    <div class="modal-title">Add Media</div>
    <ul class="action-list">
      <li onclick="pickFiles()">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Choose from Files
      </li>
      <li onclick="pickGallery()">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Choose from Gallery
      </li>
    </ul>
  `);
}
function pickFiles() {
  closeModal();
  const fi = document.getElementById('fileInput');
  fi.accept = 'image/*,video/*';
  fi.click();
}
function pickGallery() {
  closeModal();
  const fi = document.getElementById('fileInput');
  fi.accept = 'image/*,video/*';
  fi.click();
}

// ══════════════════════════════════════════════
//  FILE HANDLING
// ══════════════════════════════════════════════
function handleFiles(e) {
  const files = Array.from(e.target.files);
  e.target.value = '';
  if (!files.length) return;
  files.forEach(f => processFile(f));
}

function processFile(file) {
  const id = uid();
  const isVideo = file.type.startsWith('video/');
  const type = isVideo ? 'video' : 'image';

  // Read as data URL for immediate local display
  const reader = new FileReader();
  reader.onload = ev => {
    const src = ev.target.result;
    const item = {
      id, name: file.name, type, src,
      thumb: isVideo ? null : src, // video thumb generated below
      folder: currentFolder && currentFolder !== '__all__' && currentFolder !== '__fav__' ? currentFolder : null,
      fav: false, date: Date.now(), hosted: null
    };
    if (isVideo) generateVideoThumb(src, thumb => { item.thumb = thumb; saveDB(); render(); });
    db.media.push(item);
    saveDB();
    render();

    // Queue upload to ImgBB (images only; video upload not supported by ImgBB)
    if (!isVideo && IMGBB_KEY !== 'YOUR_IMGBB_API_KEY') {
      uploadQueue.push({ id, src });
      processUploadQueue();
    }
  };
  reader.readAsDataURL(file);
}

function generateVideoThumb(src, cb) {
  const video = document.createElement('video');
  video.src = src;
  video.muted = true;
  video.playsInline = true;
  video.currentTime = 0.5;
  video.addEventListener('seeked', () => {
    const canvas = document.createElement('canvas');
    canvas.width = 200; canvas.height = 200;
    const ctx = canvas.getContext('2d');
    const vw = video.videoWidth, vh = video.videoHeight;
    const scale = Math.max(200/vw, 200/vh);
    const w = vw*scale, h = vh*scale;
    ctx.drawImage(video, (200-w)/2, (200-h)/2, w, h);
    cb(canvas.toDataURL('image/jpeg', 0.6));
  }, {once:true});
  video.addEventListener('error', () => cb(null), {once:true});
  video.load();
}

// ══════════════════════════════════════════════
//  IMGBB UPLOAD QUEUE
// ══════════════════════════════════════════════
async function processUploadQueue() {
  if (uploading || !uploadQueue.length) return;
  uploading = true;
  showUploadToast();

  while (uploadQueue.length) {
    const { id, src } = uploadQueue.shift();
    try {
      const base64 = src.split(',')[1];
      const fd = new FormData();
      fd.append('key', IMGBB_KEY);
      fd.append('image', base64);
      const pct = Math.round(((uploadQueue.length === 0 ? 1 : 0.9)) * 100);
      setUploadProgress(pct);
      const res = await fetch('https://api.imgbb.com/1/upload', { method:'POST', body: fd });
      const data = await res.json();
      if (data.success) {
        const m = db.media.find(m=>m.id===id);
        if (m) {
          m.hosted = data.data.url;
          m.thumb = data.data.thumb?.url || data.data.display_url;
          saveDB();
        }
      }
    } catch(err) { console.warn('Upload failed', err); }
    setUploadProgress(100);
    await delay(300);
  }
  hideUploadToast();
  uploading = false;
  render();
}

function showUploadToast() {
  const t = document.getElementById('uploadToast');
  t.classList.add('visible');
  document.getElementById('uploadLabel').textContent = 'Uploading to cloud…';
}
function hideUploadToast() {
  document.getElementById('uploadToast').classList.remove('visible');
}
function setUploadProgress(pct) {
  document.getElementById('uploadFill').style.width = pct + '%';
  document.getElementById('uploadLabel').textContent = `Uploading… ${pct}%`;
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function emptyState(title, desc) {
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <h3>${title}</h3><p>${desc}</p>
  </div>`;
}

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  const t = document.getElementById('uploadToast');
  document.getElementById('uploadLabel').textContent = msg;
  document.getElementById('uploadFill').style.width = '0%';
  t.classList.add('visible');
  toastTimer = setTimeout(() => t.classList.remove('visible'), 2000);
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
render();

// Floating topbar scroll behaviour
const _view = document.getElementById('mainView');
const _tb = document.getElementById('topbar');
_view.addEventListener('scroll', function() {
  const yes = this.scrollTop > 48;
  _tb.classList.toggle('scrolled', yes);
  const row = document.getElementById('topbarRow');
  if (row && !row.classList.contains('always-show')) {
    row.style.opacity = yes ? '1' : '0';
    row.style.pointerEvents = yes ? 'all' : 'none';
  }
  // Fade large title block as user scrolls up
  const ltb = document.getElementById('largeTitleBlock');
  if (ltb) {
    const pct = Math.max(0, 1 - this.scrollTop / 60);
    ltb.style.opacity = pct;
  }
}, {passive:true});

</script>
